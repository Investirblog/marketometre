name: Fetch Daily Market Data

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch market data
        run: python fetch_data.py

      - name: Commit fichiers
        run: |
          git config user.name  "MarketOmetre Bot"
          git config user.email "bot@marketometre.app"
          git add data.json history.json
          git status
          git commit -m "data: $(date +%Y-%m-%d)" || echo "Rien a committer"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
