name: Fetch Daily Market Data

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch et mise à jour history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python fetch_data.py

          TODAY=$(date +%Y-%m-%d)
          API="https://api.github.com/repos/Investirblog/marketometre/contents/history.json"

          # Récupérer SHA et contenu actuel
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API")
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))")
          CURRENT=$(echo "$RESPONSE" | python3 -c "import sys,json,base64; d=json.load(sys.stdin); print(base64.b64decode(d['content']).decode())")

          echo "SHA: $SHA"

          # Construire nouveau history.json et l'écrire dans un fichier temporaire
          python3 -c "
import json, sys
from datetime import date

today = '${TODAY}'
current = json.loads(open('/dev/stdin').read())
entries = current.get('entries', current) if isinstance(current, dict) else current

with open('data.json') as f:
    d = json.load(f)

entries = [e for e in entries if e.get('date') != today]
entries.append({
    'date': today,
    'scoreUS': d['scoreUS'],
    'scoreEU': d['scoreEU'],
    'vix':     d['kpis']['vix']['value'],
    'vstoxx':  d['kpis']['vstoxx']['value'],
    'hy':      d['kpis']['hy']['value'].replace('%',''),
    'pc':      d['kpis']['pc']['value'],
    'breadth': str(d['pillarsUS'][2]['score']),
    'euSent':  str(d['pillarsEU'][1]['score']),
})
entries = sorted(entries, key=lambda e: e['date'])[-365:]
output = {'last_updated': today, 'entries': entries}
with open('history_new.json','w') as f:
    json.dump(output, f, ensure_ascii=False, indent=2)
print(f'history_new.json: {len(entries)} entrees')
" <<< "$CURRENT"

          echo "Fichier construit:"
          cat history_new.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'{len(d[\"entries\"])} entrees, derniere: {d[\"entries\"][-1][\"date\"]}')"

          # Encoder en base64 et pousser
          B64=$(base64 -w 0 history_new.json)

          PUSH=$(curl -s -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"history: ${TODAY}\",\"content\":\"${B64}\",\"sha\":\"${SHA}\"}" \
            "$API")

          echo "Push result: $(echo "$PUSH" | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK '+d['commit']['sha'][:8] if 'commit' in d else 'ERR: '+str(d.get('message',''))[:80])")"

          # Committer data.json
          git config user.name  "MarketOmetre Bot"
          git config user.email "bot@marketometre.app"
          git add data.json
          git commit -m "data: ${TODAY}" || echo "Rien a committer"
          git push
