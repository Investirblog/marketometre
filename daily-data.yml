name: Fetch Daily Market Data

on:
  schedule:
    # Chaque jour de semaine à 7h30 UTC (9h30 heure belge) — après ouverture des marchés EU
    - cron: '30 7 * * 1-5'
  # Permet aussi de lancer manuellement depuis GitHub → Actions → Run workflow
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch market data → data.json
        run: python fetch_data.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit data.json et history.json
        run: |
          git config user.name  "MarketOmetre Bot"
          git config user.email "bot@marketometre.app"
          echo "=== history.json contenu ==="
          cat history.json
          echo ""
          echo "=== git status avant add ==="
          git status
          git add -f data.json history.json
          echo "=== git status après add ==="
          git status
          git diff --cached --stat
          git commit -m "data: $(date +%Y-%m-%d)" || echo "Rien à committer"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
