<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketOmètre Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1117;--bg2:#161b22;--border:rgba(255,255,255,0.10);
    --text:#f0f2f8;--muted:#9ba3b4;
    --panic:#ef4444;--fear:#f97316;--neutral:#eab308;--greed:#84cc16;--euphoria:#22c55e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;background:transparent;font-family:'Open Sans',sans-serif}

  .widget{
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px 20px 14px;
    display:flex;
    flex-direction:column;
    gap:12px;
    max-width:560px;
    margin:0 auto;
  }

  /* HEADER ROW */
  .w-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .w-brand{
    display:flex;
    align-items:center;
    gap:7px;
    text-decoration:none;
  }
  .w-icon{
    width:22px;height:22px;
    background:linear-gradient(135deg,#3b82f6,#10b981);
    border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;
  }
  .w-title{font-size:12px;font-weight:700;color:var(--text);letter-spacing:-.2px}
  .w-title span{font-weight:600;opacity:.55}
  .w-date{font-size:10px;font-weight:600;color:var(--muted)}

  /* SCORES ROW */
  .w-scores{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .w-score{
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px 10px;
    position:relative;
    overflow:hidden;
  }
  .w-score::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
  }
  .w-score.us::before{background:#3b82f6}
  .w-score.eu::before{background:#10b981}

  .w-score-label{
    font-size:9px;font-weight:700;letter-spacing:1.8px;
    text-transform:uppercase;color:var(--muted);margin-bottom:8px;
    display:flex;align-items:center;gap:5px;
  }
  .w-dot{width:5px;height:5px;border-radius:50%}
  .us .w-dot{background:#3b82f6}
  .eu .w-dot{background:#10b981}

  /* mini gauge */
  .w-gauge{width:90px;margin:0 auto 6px}
  .w-gauge svg{width:100%;overflow:visible;display:block}

  .w-num{
    text-align:center;
    font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1;
  }
  .w-zone{
    text-align:center;
    font-size:9px;font-weight:700;letter-spacing:1.5px;
    text-transform:uppercase;margin-top:3px;
  }

  /* MINI BARS */
  .w-bars{display:flex;flex-direction:column;gap:4px;margin-top:8px}
  .w-bar-row{display:flex;align-items:center;gap:6px}
  .w-bar-name{font-size:9px;font-weight:600;color:var(--muted);width:70px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .w-bar-wrap{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
  .w-bar-fill{height:100%;border-radius:3px;width:0%;transition:width .8s cubic-bezier(.4,0,.2,1)}

  /* FOOTER */
  .w-footer{
    display:flex;align-items:center;justify-content:space-between;
    padding-top:4px;border-top:1px solid var(--border);
  }
  .w-footer-left{font-size:9px;font-weight:600;color:var(--muted)}
  .w-cta{
    font-size:10px;font-weight:700;
    color:#3b82f6;text-decoration:none;
    background:rgba(59,130,246,.1);
    border:1px solid rgba(59,130,246,.25);
    padding:4px 10px;border-radius:8px;
    transition:background .2s;
  }
  .w-cta:hover{background:rgba(59,130,246,.2)}

  /* zone colors */
  .c-panic{color:var(--panic)}.c-fear{color:var(--fear)}
  .c-neutral{color:var(--neutral)}.c-greed{color:var(--greed)}.c-euphoria{color:var(--euphoria)}

  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .widget{animation:fadeIn .4s ease}
</style>
</head>
<body>

<div class="widget">
  <!-- HEADER -->
  <div class="w-header">
    <a class="w-brand" href="https://marketometre.netlify.app" target="_blank">
      <div class="w-icon">📊</div>
      <div class="w-title">Market<span>Omètre</span></div>
    </a>
    <div class="w-date" id="w-date">—</div>
  </div>

  <!-- SCORES -->
  <div class="w-scores">
    <!-- US -->
    <div class="w-score us">
      <div class="w-score-label"><div class="w-dot"></div>États-Unis</div>
      <div class="w-gauge">
        <svg viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="wgUS" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ef4444"/>
              <stop offset="25%" stop-color="#f97316"/>
              <stop offset="50%" stop-color="#eab308"/>
              <stop offset="75%" stop-color="#84cc16"/>
              <stop offset="100%" stop-color="#22c55e"/>
            </linearGradient>
          </defs>
          <path d="M5,45 A40,40 0 0,1 95,45" stroke="rgba(255,255,255,0.08)" stroke-width="6" fill="none" stroke-linecap="round"/>
          <path id="warc-us" d="M5,45 A40,40 0 0,1 95,45" stroke="url(#wgUS)" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="126" stroke-dashoffset="126"/>
          <line id="wneedle-us" x1="50" y1="45" x2="50" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round" transform="rotate(-90 50 45)" opacity="0.9"/>
          <circle cx="50" cy="45" r="3" fill="white" opacity="0.9"/>
        </svg>
      </div>
      <div class="w-num" id="wnum-us">—</div>
      <div class="w-zone" id="wzone-us">…</div>
      <div class="w-bars" id="wbars-us"></div>
    </div>

    <!-- EU -->
    <div class="w-score eu">
      <div class="w-score-label"><div class="w-dot"></div>Europe</div>
      <div class="w-gauge">
        <svg viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="wgEU" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ef4444"/>
              <stop offset="25%" stop-color="#f97316"/>
              <stop offset="50%" stop-color="#eab308"/>
              <stop offset="75%" stop-color="#84cc16"/>
              <stop offset="100%" stop-color="#22c55e"/>
            </linearGradient>
          </defs>
          <path d="M5,45 A40,40 0 0,1 95,45" stroke="rgba(255,255,255,0.08)" stroke-width="6" fill="none" stroke-linecap="round"/>
          <path id="warc-eu" d="M5,45 A40,40 0 0,1 95,45" stroke="url(#wgEU)" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="126" stroke-dashoffset="126"/>
          <line id="wneedle-eu" x1="50" y1="45" x2="50" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round" transform="rotate(-90 50 45)" opacity="0.9"/>
          <circle cx="50" cy="45" r="3" fill="white" opacity="0.9"/>
        </svg>
      </div>
      <div class="w-num" id="wnum-eu">—</div>
      <div class="w-zone" id="wzone-eu">…</div>
      <div class="w-bars" id="wbars-eu"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="w-footer">
    <div class="w-footer-left">Données temps réel · FRED · Yahoo Finance · CBOE</div>
    <a class="w-cta" href="https://marketometre.netlify.app" target="_blank">Voir le détail →</a>
  </div>
</div>

<script>
const PROXY='https://corsproxy.io/?';
const FRED_KEY='96e939128c65bf0f827ccfaa87820026';

// ── helpers ──
function zoneColor(s){return s<20?'var(--panic)':s<40?'var(--fear)':s<60?'var(--neutral)':s<80?'var(--greed)':'var(--euphoria)'}
function zoneClass(s){return s<20?'c-panic':s<40?'c-fear':s<60?'c-neutral':s<80?'c-greed':'c-euphoria'}
function zoneLabel(s){return s<20?'Panique':s<40?'Peur':s<60?'Neutre':s<80?'Euphorie':'Excès'}
function clamp(v,a=0,b=100){return Math.max(a,Math.min(b,v))}
function normalize(v,lo,hi,inv=false){let p=(v-lo)/(hi-lo)*100;if(inv)p=100-p;return clamp(p)}

const scoreVix    = v  => normalize(v,   10, 50,  true);
const scoreVstoxx = v  => normalize(v,   10, 45,  true);
const scorePutCall= pc => normalize(pc,  0.4,1.2, true);
const scoreHY     = s  => normalize(s,   2,  10,  true);
const scoreMom    = p  => normalize(p,  -30, 30);
const scoreZEW    = z  => normalize(z,  -60, 80);

// ── fetch ──
async function fredLatest(series){
  const url=`https://api.stlouisfed.org/fred/series/observations?series_id=${series}&api_key=${FRED_KEY}&file_type=json&sort_order=desc&limit=5`;
  const r=await fetch(url);const j=await r.json();
  const obs=j.observations.find(o=>o.value!=='.');
  return parseFloat(obs.value);
}
async function fetchPutCall(){
  const url='https://cdn.cboe.com/resources/options/volume_and_call_put_ratios/equitypc.csv';
  const r=await fetch(PROXY+encodeURIComponent(url));const txt=await r.text();
  const lines=txt.trim().split('\n').filter(l=>l.trim()&&!l.startsWith('Your')&&!l.startsWith(',')&&!l.startsWith('DATE')&&!l.startsWith(' '));
  const parts=lines[lines.length-1].split(',');
  const pc=parseFloat(parts[4]);return isNaN(pc)?0.7:pc;
}
async function yahooCloses(sym,range,interval){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=${range}&interval=${interval}&includePrePost=false`;
  const r=await fetch(PROXY+encodeURIComponent(url));const j=await r.json();
  return j.chart.result[0].indicators.quote[0].close.filter(v=>v!=null);
}
async function yahooLatest(sym){const c=await yahooCloses(sym,'5d','1d');return c[c.length-1]}
async function yahooMA(sym,days){
  const range=days<=125?'6mo':'1y';
  const c=await yahooCloses(sym,range,'1d');
  const latest=c[c.length-1];
  const slice=c.slice(-days);
  const ma=slice.reduce((a,b)=>a+b,0)/slice.length;
  return{pct:(latest-ma)/ma*100};
}
async function safe(fn,fb){try{return await fn()}catch(e){return fb}}

// ── render gauge ──
function renderGauge(prefix,score){
  const arc=document.getElementById(`warc-${prefix}`);
  const needle=document.getElementById(`wneedle-${prefix}`);
  setTimeout(()=>{
    arc.style.transition='stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)';
    arc.setAttribute('stroke-dashoffset',126-(score/100)*126);
    needle.style.transition='transform 1s cubic-bezier(.4,0,.2,1)';
    needle.setAttribute('transform',`rotate(${-90+(score/100)*180} 50 45)`);
  },200);
  const num=document.getElementById(`wnum-${prefix}`);
  const zone=document.getElementById(`wzone-${prefix}`);
  num.textContent=Math.round(score);
  num.className='w-num '+zoneClass(score);
  zone.textContent=zoneLabel(score);
  zone.className='w-zone '+zoneClass(score);
}

function renderBars(prefix,pillars){
  const el=document.getElementById(`wbars-${prefix}`);
  el.innerHTML=pillars.map(p=>`
    <div class="w-bar-row">
      <div class="w-bar-name">${p.name}</div>
      <div class="w-bar-wrap"><div class="w-bar-fill" style="background:${zoneColor(p.score)}" data-w="${p.score}"></div></div>
    </div>`).join('');
  setTimeout(()=>{
    el.querySelectorAll('.w-bar-fill').forEach(b=>{b.style.width=b.dataset.w+'%'});
  },300);
}

// ── main ──
async function load(){
  document.getElementById('w-date').textContent=
    new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});

  const [vix,hySpread,putCall,spData,vstoxx,sx5eData,zew]=await Promise.all([
    safe(()=>fredLatest('VIXCLS'),         22),
    safe(()=>fredLatest('BAMLH0A0HYM2'),   4.5),
    safe(()=>fetchPutCall(),               0.70),
    safe(()=>yahooMA('^GSPC',200),         {pct:4}),
    safe(()=>yahooLatest('^V2TX'),         22),
    safe(()=>yahooMA('^STOXX50E',200),     {pct:3}),
    safe(()=>fredLatest('ZEWSELMU'),       0),
  ]);

  const iTraxxProxy=vstoxx*0.18;

  const us0=scoreVix(vix),us1=scorePutCall(putCall),us2=scoreMom(spData.pct),us3=scoreHY(hySpread),us4=scoreMom(spData.pct);
  const scoreUS=clamp(us0*.25+us1*.20+us2*.20+us3*.20+us4*.15);

  const eu0=scoreVstoxx(vstoxx),eu1=scoreZEW(zew),eu2=scoreMom(sx5eData.pct),eu3=scoreHY(iTraxxProxy),eu4=scoreMom(sx5eData.pct);
  const scoreEU=clamp(eu0*.25+eu1*.20+eu2*.20+eu3*.20+eu4*.15);

  renderGauge('us',scoreUS);
  renderGauge('eu',scoreEU);

  renderBars('us',[
    {name:'VIX',score:us0},{name:'Put/Call',score:us1},
    {name:'Breadth',score:us2},{name:'HY Spread',score:us3},{name:'Momentum',score:us4}
  ]);
  renderBars('eu',[
    {name:'VSTOXX',score:eu0},{name:'ZEW',score:eu1},
    {name:'Breadth',score:eu2},{name:'iTraxx',score:eu3},{name:'Momentum',score:eu4}
  ]);
}

load();
</script>
</body>
</html>
